{{ define "main" }}
  <h2>Tags</h2>
  <div class="tag-cloud">
    {{ range $name, $taxonomy := .Site.Taxonomies.tags }}
      <a href="{{ "/tags/" | relURL }}{{ $name | urlize }}/" class="tag-item">
        {{ $name }} <span class="tag-count">{{ len $taxonomy }}</span>
      </a>
    {{ end }}
  </div>
{{ end }}
