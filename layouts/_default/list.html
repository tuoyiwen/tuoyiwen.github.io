{{ define "main" }}
  <section>
    <h2>About Me</h2>
    <p>{{ .Site.Params.bio }}</p>
  </section>

  <section>
    <h2>Blog Posts</h2>
    <ul class="post-list">
      {{ range where .Site.RegularPages "Section" "posts" }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span class="date">[{{ .Date.Format "2006-01-02" }}]</span>
      </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
